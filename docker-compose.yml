  # --- MODO DESARROLLO ---

services:
  db:
    image: postgres:16-alpine
    container_name: proyecto_db
    environment:
      POSTGRES_DB: mi_base_datos
      POSTGRES_USER: usuario_db
      POSTGRES_PASSWORD: password_seguro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usuario_db -d mi_base_datos"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- BACKEND EN MODO DESARROLLO ---
  backend:
    image: maven:3.9.6-eclipse-temurin-21 # Usamos la imagen de Maven directamente
    container_name: backend
    working_dir: /app
    ports:
      - "8080:8080"
    volumes:
      - ./backend/autostore-sys-web:/app # 👈 ESPEJO: Tu código local se refleja dentro del contenedor al instante
      - ~/.m2:/root/.m2 # Guarda las librerías en tu PC para que no las descargue siempre
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/mi_base_datos
      SPRING_DATASOURCE_USERNAME: usuario_db
      SPRING_DATASOURCE_PASSWORD: password_seguro
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    # En lugar de ejecutar el .jar, ejecutamos Spring en modo desarrollo:
    command: mvn spring-boot:run 
    depends_on:
      db:
        condition: service_healthy

  # --- FRONTEND EN MODO DESARROLLO ---
# --- FRONTEND ---
  frontend:
    image: node:20-alpine
    container_name: frontend
    working_dir: /app
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules # 👈 Crucial: protege los módulos de Docker
    # 🔥 ESTE COMANDO ASEGURA QUE PRIMERO SE INSTALEN ANTES DE CORRER EL START:
    command: sh -c "npm install && npm run start -- --host 0.0.0.0 --poll 2000 --allowed-hosts frontend"
    depends_on:
      - backend
volumes:
  postgres_data: